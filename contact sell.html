<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Support</title>

<link rel="stylesheet" href="https://unpkg.com/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<style>

/* 🌿 Background */
body {
    margin: 0;
    padding: 0;
    background-image: url('https://github.com/HarshParmar11/flux-league_of_coders-/blob/main/grass.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    overflow-x: hidden;
    color: #ffffff;

    animation: bgZoom 20s ease-in-out infinite alternate;
}

@keyframes bgZoom {
    from { background-size: 100%; }
    to { background-size: 110%; }
}

/* 🌌 Gradient Overlay */
.page-overlay {
    min-height: 100vh;
    width: 100%;
    background: linear-gradient(
        110deg,
        rgba(0,0,0,0.85) 0%,
        rgba(0,0,0,0.75) 35%,
        rgba(0,0,0,0.55) 55%,
        rgba(0,0,0,0.35) 75%,
        rgba(0,0,0,0.25) 100%
    );
}

/* Layout */
.split-layout {
    min-height: 100vh;
}

/* ✨ Animation */
@keyframes fadeSlideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.left-image-panel,
.details-form-panel {
    animation: fadeSlideUp 0.8s ease forwards;
}

/* 🧊 FINAL PANEL (UPDATED) */
.details-form-panel {
    background: rgba(0, 0, 0, 0.55);
    border-radius: 20px;
    margin: 40px;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    transition: all 0.4s ease;
}

.details-form-panel:hover {
    background: rgba(0, 0, 0, 0.65);
    box-shadow: 0 15px 50px rgba(0,0,0,0.8);
}

/* Labels */
.form-label {
    color: #e0e0e0;
}

/* Inputs */
.form-control,
.form-select {
    background: rgba(255,255,255,0.85);
    border-radius: 10px;
    border: none;
    transition: all 0.25s ease;
}

.form-control:focus,
.form-select:focus {
    background: #ffffff;
    transform: scale(1.02);
    box-shadow: 0 0 12px rgba(25,135,84,0.6);
}

/* Input Icon */
.input-group-text {
    background-color: #198754;
    color: white;
}

/* 🚀 Button */
.btn-success {
    border-radius: 12px;
    transition: all 0.3s ease;
}

.btn-success:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 10px 25px rgba(25,135,84,0.6);
}

/* Mobile */
@media (max-width: 991px) {
    .details-form-panel {
        border: none;
        margin: 20px;
    }
}

</style>
</head>

<body>

<div class="page-overlay">
<div class="container-fluid p-0">
<div class="row g-0 split-layout align-items-stretch">

<!-- LEFT SIDE -->
<div class="col-12 col-lg-6 d-flex align-items-center">
<div class="w-100 p-4 p-xl-5">
<div style="max-width:500px">

<h2 class="display-5 fw-bold">Reach Out to Us</h2>
<p class="lead opacity-75 mb-5">
Farm to Market Connect supports growers. Contact us anytime.
</p>

<p><strong>📍 Address:</strong><br>Kisan Bhavan, Ahmedabad</p>
<p><strong>📞 Phone:</strong> +91 98765 43210</p>
<p><strong>📧 Email:</strong> support@farmtomarket.in</p>

</div>
</div>
</div>

<!-- ✅ RIGHT SIDE PANEL (FIXED STRUCTURE) -->
<div class="col-12 col-lg-6 d-flex align-items-center">
<div class="details-form-panel w-100 p-4 p-xl-5">

<form id="form">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" placeholder="Enter name" required>
</div>

<div class="row">
<div class="col-md-6 mb-3">
<label class="form-label">Phone</label>
<input type="text" class="form-control" placeholder="Mobile Number">
</div>
</div>

<!-- ❌ Crop removed -->

<div class="mb-3">
<label class="form-label">Subject</label>
<select class="form-select">
<option disabled selected>Select issue</option>
<option>Help listing crop</option>
<option>Arrange transport</option>
<option>Payment issue</option>
<option>Other</option> <!-- ✅ Added -->
</select>
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea class="form-control" rows="4"></textarea>
</div>

<button class="btn btn-success w-100">Submit</button>

<div id="alertBox" class="alert alert-success mt-3 text-center" style="display:none;">
Message Sent 🚀
</div>

</form>

</div>
</div>

</div>
</div>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();
    document.getElementById("alertBox").style.display = "block";
    this.reset();
});
</script>

</body>
</html>
