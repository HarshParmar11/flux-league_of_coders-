<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | FarmConnect Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary-green: #00b894; --deep-forest: #006266; --bg-light: #f8fafc; }
        body { background-color: var(--bg-light); font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; }
        .checkout-container { max-width: 1050px; margin: 40px auto; }
        .main-card { border: none; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.06); background: #fff; overflow: hidden; }

        /* Sidebar Tabs */
        .nav-pills .nav-link {
            color: #64748b; font-weight: 600; padding: 18px; border-radius: 16px; 
            border: 2px solid transparent; margin-bottom: 12px; transition: 0.3s; text-align: left;
        }
        .nav-pills .nav-link.active { background-color: #f0fff4; color: var(--primary-green); border-color: var(--primary-green); }

        /* Bank Logo Grid */
        .bank-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .bank-opt {
            border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px;
            cursor: pointer; transition: 0.2s; text-align: center; background: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 95px;
        }
        .bank-opt img { height: 30px; width: auto; max-width: 90%; margin-bottom: 8px; object-fit: contain; }
        .bank-opt small { font-weight: 600; color: #64748b; font-size: 11px; }
        .bank-opt:hover { border-color: var(--primary-green); background: #fafffc; }
        .bank-opt.selected { border: 2px solid var(--primary-green); background: #f0fff4; transform: translateY(-3px); }
        .bank-opt.selected small { color: var(--primary-green); }

        /* Summary Panel */
        .summary-side { background: var(--deep-forest); color: white; padding: 45px; }
        .btn-pay {
            background: white; color: var(--deep-forest); border: none; padding: 18px;
            border-radius: 14px; font-weight: 800; width: 100%; transition: 0.3s; font-size: 1.1rem;
        }
        .btn-pay:hover { background: var(--primary-green); color: white; transform: translateY(-3px); }

        #loading-overlay, #success-screen { display: none; text-align: center; padding: 80px 20px; }
        .success-icon { font-size: 6rem; color: var(--primary-green); }
        .otp-display { background: #f0fff4; border: 2px dashed var(--primary-green); padding: 20px; border-radius: 16px; display: inline-block; }
    </style>
</head>
<body>

<div class="container checkout-container px-4">
    <div class="main-card shadow-lg" id="checkout-ui">
        <div class="row g-0">
            <div class="col-lg-7 p-4 p-md-5">
                <div class="d-flex align-items-center mb-5">
                    <h3 class="fw-800 mb-0">Secure Checkout</h3>
                    <span class="ms-auto badge bg-light text-success border border-success-subtle rounded-pill px-3 py-2">
                        <i class="fas fa-shield-check me-1"></i> ESCROW SECURED
                    </span>
                </div>

                <div class="row">
                    <div class="col-md-5">
                        <div class="nav flex-column nav-pills" role="tablist">
                            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-upi"><i class="fas fa-mobile-screen me-2"></i> UPI</button>
                            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-card"><i class="fas fa-credit-card me-2"></i> Cards</button>
                            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-net"><i class="fas fa-university me-2"></i> Net Banking</button>
                            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-wallet"><i class="fas fa-wallet me-2"></i> Wallets</button>
                        </div>
                    </div>

                    <div class="col-md-7 ps-md-4 mt-4 mt-md-0">
                        <div class="tab-content">
                            <div class="tab-pane fade show active" id="tab-upi">
                                <label class="small fw-bold text-muted mb-2">UPI ID</label>
                                <div class="input-group mb-4">
                                    <input type="text" class="form-control p-3 bg-light border-0" placeholder="user@okaxis">
                                    <button class="btn btn-dark">Verify</button>
                                </div>
                                <div class="d-flex gap-4">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/UPI-Logo-vector.svg" height="25" alt="UPI">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/71/PhonePe_Logo.svg" height="25" alt="PhonePe">
                                </div>
                            </div>

                            <div class="tab-pane fade" id="tab-card">
                                <div class="mb-3">
                                    <label class="small fw-bold text-muted mb-2">Card Number</label>
                                    <input type="text" id="cardNum" class="form-control p-3 bg-light border-0" placeholder="0000 0000 0000 0000" maxlength="19" inputmode="numeric">
                                </div>
                                <div class="row g-2">
                                    <div class="col-7">
                                        <label class="small fw-bold text-muted mb-2">Expiry</label>
                                        <div class="d-flex gap-2">
                                            <select class="form-select bg-light border-0 p-3" id="eM">
                                                <option selected disabled>MM</option>
                                                <script>for(let i=1; i<=12; i++) document.write(`<option>${i.toString().padStart(2,'0')}</option>`);</script>
                                            </select>
                                            <select class="form-select bg-light border-0 p-3" id="eY">
                                                <option selected disabled>YY</option>
                                                <script>const y=new Date().getFullYear()%100; for(let i=y; i<=y+10; i++) document.write(`<option>${i}</option>`);</script>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-5">
                                        <label class="small fw-bold text-muted mb-2">CVV</label>
                                        <input type="password" id="cvvNum" class="form-control p-3 bg-light border-0" placeholder="***" maxlength="3" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                                    </div>
                                </div>
                            </div>

                            <div class="tab-pane fade" id="tab-net">
                                <label class="small fw-bold text-muted mb-3">Popular Banks</label>
                                <div class="bank-grid">
                                    <div class="bank-opt" onclick="selBank(this, 'https://onlinesbi.sbi/')">
                                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/cc/SBI-logo.svg" alt="SBI"><small>SBI</small>
                                    </div>
                                    <div class="bank-opt" onclick="selBank(this, 'https://netbanking.hdfcbank.com/')">
                                        <img src="https://www.gurpreetsaluja.com/wp-content/uploads/2020/09/HDFC-LOGO.png" alt="HDFC"><small>HDFC</small>
                                    </div>
                                    <div class="bank-opt" onclick="selBank(this, 'https://infinity.icicibank.com/')">
                                        <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/ICICI_Bank_Logo.svg" alt="ICICI"><small>ICICI</small>
                                    </div>
                                    <div class="bank-opt" onclick="selBank(this, 'https://retail.axisbank.co.in/')">
                                        <img src="https://upload.wikimedia.org/wikipedia/commons/1/1a/Axis_Bank_logo.svg" alt="Axis"><small>Axis</small>
                                    </div>
                                    <div class="bank-opt" onclick="selBank(this, 'https://netbanking.kotak.com/')">
                                        <img src="https://upload.wikimedia.org/wikipedia/en/3/39/Kotak_Mahindra_Group_logo.svg" alt="Kotak"><small>Kotak</small>
                                    </div>
                                    <div class="bank-opt" onclick="selBank(this, 'https://www.bobibanking.com/')">
                                        <img src="https://1000logos.net/wp-content/uploads/2021/06/Bank-of-Baroda-logo.png" alt="BOB"><small>BOB</small>
                                    </div>
                                </div>
                                <label class="small fw-bold text-muted mt-4 mb-2">Other Banks</label>
                                <select class="form-select bg-light border-0 p-3" id="bankDropdown" onchange="dropSel()">
                                    <option value="" selected disabled>Choose Bank...</option>
                                    <option value="https://www.pnbnet.org.in/">Punjab National Bank</option>
                                    <option value="https://www.idfcfirstbank.com/">IDFC First</option>
                                    <option value="https://www.yesbank.in/">Yes Bank</option>
                                </select>
                            </div>

                            <div class="tab-pane fade" id="tab-wallet">
                                <div class="list-group border rounded-4 overflow-hidden">
                                    <label class="list-group-item p-3 d-flex align-items-center"><input type="radio" name="w" class="form-check-input me-3" checked> <img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Paytm_Logo_%28standalone%29.svg" height="15" alt="Paytm"></label>
                                    <label class="list-group-item p-3 d-flex align-items-center"><input type="radio" name="w" class="form-check-input me-3"> <img src="https://upload.wikimedia.org/wikipedia/commons/7/71/PhonePe_Logo.svg" height="20" alt="PhonePe"></label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5 summary-side">
                <h4 class="fw-bold mb-4">Total Amount</h4>
                <h1 class="display-4 fw-800 mb-5">₹9,350</h1>
                <div class="mb-5 opacity-75 small">
                    <div class="d-flex justify-content-between mb-2"><span>Order Value</span><span>₹8,500</span></div>
                    <div class="d-flex justify-content-between"><span>Taxes & Fees</span><span>₹850</span></div>
                </div>
                <button class="btn-pay" onclick="pay()">AUTHORIZE & PAY</button>
            </div>
        </div>
    </div>

    <div class="main-card py-5" id="loading-overlay">
        <div class="spinner-border text-success mb-4" style="width: 4rem; height: 4rem;"></div>
        <h3 class="fw-800">Processing...</h3>
    </div>

    <div class="main-card" id="success-screen">
        <div class="py-5 text-center">
            <i class="fas fa-check-circle success-icon mb-4"></i>
            <h2 class="fw-800">Payment Successful!</h2>
            <div class="otp-display mt-4 mb-4"><p class="small fw-bold text-muted mb-1">Release PIN</p><h1 class="display-3 fw-800 text-success mb-0" style="letter-spacing:10px;">9021</h1></div>
            <br><button class="btn btn-dark px-5 py-3 rounded-pill fw-bold" onclick="location.reload()">Back to Dashboard</button>
        </div>
    </div>
</div>

<script>
    let currentBankUrl = "";

    // Card Number Formatting (Spaces every 4 digits)
    document.getElementById('cardNum').addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, '');
        let formattedValue = value.match(/.{1,4}/g)?.join(' ') || '';
        e.target.value = formattedValue.substring(0, 19);
    });

    function selBank(el, url) { 
        document.querySelectorAll('.bank-opt').forEach(b => b.classList.remove('selected'));
        document.getElementById('bankDropdown').value = "";
        el.classList.add('selected'); 
        currentBankUrl = url;
    }

    function dropSel() {
        document.querySelectorAll('.bank-opt').forEach(b => b.classList.remove('selected'));
        currentBankUrl = document.getElementById('bankDropdown').value;
    }

    function pay() {
        const activeTab = document.querySelector('.tab-pane.active').id;
        
        if(activeTab === 'tab-card') {
            const card = document.getElementById('cardNum').value.replace(/\s/g, '');
            const cvv = document.getElementById('cvvNum').value;
            if(card.length < 16 || cvv.length < 3) {
                alert("Invalid Card Details!"); return;
            }
        }

        document.getElementById('checkout-ui').style.display='none';
        document.getElementById('loading-overlay').style.display='block';

        setTimeout(() => { 
            if(activeTab === 'tab-net' && currentBankUrl) {
                window.location.href = currentBankUrl;
            } else {
                document.getElementById('loading-overlay').style.display='none'; 
                document.getElementById('success-screen').style.display='block'; 
            }
        }, 2500);
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
